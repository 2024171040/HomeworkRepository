<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Movie Site - Login</title>
    <link rel = "stylesheet" type = "text/css" href = "main.css" />
</head>
<body>
    <h1>Welcome to INTERNET-PROGRAMMING MOVIE SITE</h1>

    <p class="nav-links">
        <a href="login.html">로그인</a> |
        <a href="signup.html" class="non-active">회원가입</a>
    </p>

    <div class="login-box">
        <h2>로그인</h2>

        <form action="#" method="get">
            <table>
                <tr>
                    <td class="label-cell"><label for="loginid">아이디:</label></td>
                    <td><input id="loginid" name="loginid" type="text" placeholder="아이디를 입력하세요." required autocomplete="on" /></td>
                </tr>
                <tr>
                    <td class="label-cell"><label for="loginpw">비밀번호:</label></td>
                    <td><input id="loginpw" name="loginpw" type="password" placeholder="비밀번호를 입력하세요." required autocomplete="off" /></td>
                </tr>
            </table>
            
            <div class="button-area">
                <button class="submit-btn">로그인</button>
                <button class="reset-btn">취소</button>
            </div>
        </form>
    </div>
</body>
</html>
