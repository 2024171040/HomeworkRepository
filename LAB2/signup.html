<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Movie Site - Signup</title>
        <link rel = "stylesheet" type = "text/css" href = "main.css" />
    </head>
    <body>
        <h1>Welcome to INTERNET-PROGRAMMING MOVIE SITE</h1>

        <p class="nav-links">
            <a href="login.html" class="non-active">로그인</a> |
            <a href="signup.html">회원가입</a>
        </p>

        <div class="form-box">
            <form action="#" method="get">
                <table>
                    <tr>
                        <td class="label-cell"><label for="name">이름:</label></td>
                        <td><input id="name" name="name" type="text" autofocus required /></td>
                    </tr>
                    <tr>
                        <td class="label-cell"><label for="birth">생일:</label></td>
                        <td><input id="birth" name="birth" type="date" required /></td>
                    </tr>
                    <tr>
                        <td class="label-cell">성별:</td>
                        <td>
                            <input id="male" name="gender" type="radio" value="male" />
                            <label for="male">남성</label>
                            <input id="female" name="gender" type="radio" value="female" />
                            <label for="female">여성</label>
                        </td>
                    </tr>
                    <tr>
                        <td class="label-cell"><label for="grade">학년:</label></td>
                        <td>
                            <select id="grade" name="grade">
                                <option value="">학년을 선택하세요.</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="other">기타</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td class="label-cell"><label for="userid">아이디:</label></td>
                        <td><input id="userid" name="userid" type="text" placeholder="아이디를 입력하세요." autocomplete="on" required /></td>
                    </tr>
                    <tr>
                        <td class="label-cell"><label for="password">비밀번호:</label></td>
                        <td><input id="password" name="password" type="password" placeholder="비밀번호를 입력하세요." autocomplete="off" required /></td>
                    </tr>
                    <tr>
                        <td class="label-cell"><label for="email">이메일:</label></td>
                        <td><input id="email" name="email" type="email" placeholder="name@domain.com" autocomplete="on" required /></td>
                    </tr>
                    <tr>
                        <td class="label-cell"><label for="favorite">좋아하는 장르:</label></td>
                        <td>
                            <select id="favorite" name="favorite">
                                <option value="">좋아하는 장르를 선택하세요.</option>
                                <option value="action">액션</option>
                                <option value="comedy">코미디</option>
                                <option value="romance">로맨스</option>
                                <option value="thriller">스릴러</option>
                                <option value="horror">공포</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td class="label-cell"><label for="count">한 달에 영화 몇 편:</label></td>
                        <td><input id="count" name="count" type="number" min="0" max="30" step="1" required /></td>
                    </tr>
                </table>
                <div class="button-area">
                        <button class="submit-btn" type="submit">회원가입</button>
                        <button class="reset-btn" type="reset">취소</button>                        
                </div>
            </form>
        </div>
    </body>
</html>
